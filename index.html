<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productividad Académica - UANDES Doctorado</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="wrapper">
        <div class="sidebar">
            <div class="logo">📊 Productividad<br>UANDES</div>
            <div class="menu-item active" onclick="cambiarPagina('profesores')">👥 Profesores</div>
            <div class="menu-item" onclick="cambiarPagina('reporteria')">📋 Reportería</div>
        </div>
        
        <div class="main-content">
            <div id="page-profesores" class="page active">
                <div class="header">
                    <h1>Claustro de Doctorado</h1>
                    <p>14 profesores - Economía, Finanzas y Business Administration</p>
                </div>
                <div id="profesor-list" class="profesor-list"></div>
            </div>

            <div id="page-reporteria" class="page">
                <div class="header">
                    <h1>Reportería</h1>
                    <p>Generación de reportes académicos</p>
                </div>
                
                <div class="reporteria-container">
                    <div class="reporteria-section">
                        <div class="reporteria-title">📄 Ficha Académica CNA</div>
                        
                        <div class="reporteria-form">
                            <div class="form-group">
                                <label for="profesor-select">Seleccionar profesor:</label>
                                <select id="profesor-select">
                                    <option value="">-- Todos los profesores --</option>
                                </select>
                            </div>
                            
                            <div class="form-actions">
                                <button class="btn-primary" onclick="generarFichaCNA()">Generar Ficha CNA</button>
                            </div>
                        </div>
                        
                        <div class="reporteria-preview">
                            <div id="ficha-cna-preview" class="ficha-preview-content">
                                <p style="color: #999; text-align: center; padding: 40px;">Selecciona un profesor y genera la ficha para visualizar</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="modales-container"></div>
    
    <script src="script.js"></script>
</body>
</html>
