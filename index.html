as": [{"N°": "2", "Autor(es)": "Garcia-Marin, A.; Hoegler, P.", "Año": "2017", "Título de la publicación": "Road bumps for electric cars", "Nombre revista": "Economist", "Estado": "Publicado", "ISSN": "1476-1386"}]}, "tesis_magister_guia": {"headers": ["N°", "Año", "Autor", "Nombre de la Tesis", "Programa", "Universidad"], "filas": [{"N°": "1", "Año": "2017", "Autor": "Minsi Chen", "Nombre de la Tesis": "El Poder de la Paridad de Género", "Programa": "Magíster en Análisis Económico", "Universidad": "Universidad de Chile"}, {"N°": "2", "Año": "2017", "Autor": "César Felipe Martínez Rodríguez", "Nombre de la Tesis": "Efectos de la Competencia en la Innovación Realizada por las Firmas en América Latina", "Programa": "Magíster en Economía", "Universidad": "Universidad de Chile"}, {"N°": "3", "Año": "2018", "Autor": "Eduardo Salas Valenzuela", "Nombre de la Tesis": "Evolución del Poder de Mercado en la Industria Manufacturera Chilena", "Programa": "Magíster en Análisis Económico", "Universidad": "Universidad de Chile"}]}}}};
        
        const profesores = Object.keys(datosCompletos).map((nombre, idx) => ({
            id: `prof${String(idx + 1).padStart(2, '0')}`,
            nombre: nombre,
            resumen: generarResumen(datosCompletos[nombre]),
            tieneDatos: true
        }));
        
        function generarResumen(datos) {
            const secciones = datos.secciones || {};
            const items = [];
            
            if (secciones.publicaciones_indexadas) items.push(`${secciones.publicaciones_indexadas.filas.length} pub ind`);
            if (secciones.publicaciones_no_indexadas) items.push(`${secciones.publicaciones_no_indexadas.filas.length} no ind`);
            if (secciones.libros) items.push(`${secciones.libros.filas.length} libros`);
            if (secciones.capitulos) items.push(`${secciones.capitulos.filas.length} caps`);
            if (secciones.proyectos) items.push(`${secciones.proyectos.filas.length} proy`);
            if (secciones.tesis_magister_guia) items.push(`${secciones.tesis_magister_guia.filas.length} tm guía`);
            if (secciones.tesis_magister_coguia) items.push(`${secciones.tesis_magister_coguia.filas.length} tm coguía`);
            if (secciones.tesis_doctorado_guia) items.push(`${secciones.tesis_doctorado_guia.filas.length} td guía`);
            if (secciones.tesis_doctorado_coguia) items.push(`${secciones.tesis_doctorado_coguia.filas.length} td coguía`);
            
            return items.join(' • ') || 'Sin datos';
        }
        
        function eliminarPrimeraColumnaIfDuplicated(headers, titulo) {
            // Si la primera columna es igual al título, eliminarla
            if (headers.length > 0 && headers[0].toLowerCase() === titulo.toLowerCase()) {
                return headers.slice(1);
            }
            return headers;
        }
        
        function generarListado() {
            const lista = document.getElementById('profesor-list');
            lista.innerHTML = profesores.map(p => `
                <div class="profesor-row" onclick="abrirModal('${p.id}')">
                    <div class="profesor-info">
                        <div class="profesor-nombre">${p.nombre}</div>
                        <div class="profesor-resumen">${p.resumen}</div>
                    </div>
                    <div class="profesor-arrow">→</div>
                </div>
            `).join('');
        }
        
        function generarModales() {
            const container = document.getElementById('modales-container');
            container.innerHTML = profesores.map(p => {
                const datos = datosCompletos[p.nombre];
                
                if (!datos) {
                    return `
                        <div id="modal-${p.id}" class="modal">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h2>${p.nombre}</h2>
                                    <button class="close-btn" onclick="cerrarModal('${p.id}')">&times;</button>
                                </div>
                                <div class="modal-body">
                                    <div class="sin-datos">Información por completar.</div>
                                </div>
                            </div>
                        </div>
                    `;
                }
                
                let seccionesHTML = '';
                const ordenSecciones = [
                    'publicaciones_indexadas', 'publicaciones_no_indexadas', 
                    'libros', 'capitulos', 'proyectos',
                    'tesis_doctorado_guia', 'tesis_doctorado_coguia',
                    'tesis_magister_guia', 'tesis_magister_coguia'
                ];
                
                for (const tipo of ordenSecciones) {
                    const seccion = datos.secciones[tipo];
                    if (!seccion || !seccion.filas || seccion.filas.length === 0) continue;
                    
                    const titulo = traducirTipo(tipo);
                    let headers = seccion.headers.slice(); // Copiar
                    
                    // Eliminar primera columna si repite el título
                    headers = eliminarPrimeraColumnaIfDuplicated(headers, titulo);
                    
                    seccionesHTML += `
                        <div class="info-section">
                            <div class="section-title">${titulo} (${seccion.filas.length} registros)</div>
                            <div class="table-container">
                                <table>
                                    <thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
                                    <tbody>${seccion.filas.map(fila => `
                                        <tr>${headers.map((h, hIdx) => {
                                            let celdaOriginal = seccion.headers[hIdx];
                                            let valor = fila[celdaOriginal] || 'N/A';
                                            return `<td>${valor}</td>`;
                                        }).join('')}</tr>
                                    `).join('')}</tbody>
                                </table>
                            </div>
                        </div>
                    `;
                }
                
                return `
                    <div id="modal-${p.id}" class="modal">
                        <div class="modal-content">
                            <div class="modal-header">
                                <div><h2>${datos.nombre}</h2><p>Vínculo: ${datos.vinculo}</p></div>
                                <button class="close-btn" onclick="cerrarModal('${p.id}')">&times;</button>
                            </div>
                            <div class="modal-body">
                                <div class="info-section">
                                    <div class="section-title">Perfil Académico</div>
                                    <div class="info-grid">
                                        <div class="info-item">
                                            <div class="info-label">Título Profesional</div>
                                            <div class="info-value">${datos.titulo}</div>
                                        </div>
                                        <div class="info-item">
                                            <div class="info-label">Grado Académico</div>
                                            <div class="info-value">${datos.grado}</div>
                                        </div>
                                        <div class="info-item">
                                            <div class="info-label">Líneas de Investigación</div>
                                            <div class="info-value">${datos.lineas}</div>
                                        </div>
                                    </div>
                                </div>
                                ${seccionesHTML}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function traducirTipo(tipo) {
            const t = {
                'publicaciones_indexadas': 'Publicaciones Indexadas',
                'publicaciones_no_indexadas': 'Publicaciones No Indexadas',
                'libros': 'Libros',
                'capitulos': 'Capítulos de Libro',
                'proyectos': 'Proyectos de Investigación',
                'tesis_doctorado_guia': 'Tesis Doctorado (Profesor Guía)',
                'tesis_doctorado_coguia': 'Tesis Doctorado (Profesor Co-guía)',
                'tesis_magister_guia': 'Tesis Magister (Profesor Guía)',
                'tesis_magister_coguia': 'Tesis Magister (Profesor Co-guía)'
            };
            return t[tipo] || tipo;
        }
        
        function abrirModal(id) {
            document.getElementById(`modal-${id}`).classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function cerrarModal(id) {
            document.getElementById(`modal-${id}`).classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        }
        
        function cambiarPagina(pagina) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`page-${pagina}`).classList.add('active');
            event.target.classList.add('active');
        }
        
        generarListado();
        generarModales();
    </script>
